name: Feature request
about: Suggest a new rule, report format, integration, or workflow improvement.
title: "Feature: <short description>"
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What CI/build risk or workflow should HermesScan handle?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
