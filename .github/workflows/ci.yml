name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -ldflags "-X main.version=0.9.0" -o hermesscan ./cmd/hermesscan

      - name: Smoke test
        run: |
          ./hermesscan version
          ./hermesscan rules validate
          ./hermesscan rules docs --output reports/hermesscan-rules.md
          ./hermesscan scan ./examples --summary --no-fail
          ./hermesscan scan . --summary --exclude 'examples/**' --no-fail
