name: HermesScan

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  actions: read


jobs:
  hermes-scan:
    name: Scan build and CI scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Build HermesScan
        run: go build -ldflags "-X main.version=0.7.0" -o hermesscan ./cmd/hermesscan

      - name: Run HermesScan SARIF report
        run: |
          ./hermesscan scan . \
            --exclude 'examples/**' \
            --format sarif \
            --output reports/hermes-scan.sarif \
            --no-fail

      - name: Upload HermesScan SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/hermes-scan.sarif

      - name: Run HermesScan gate
        run: ./hermesscan scan . --summary --fail-on high --exclude 'examples/**'
